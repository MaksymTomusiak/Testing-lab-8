name: Migration

on:
  pull_request:
    branches:
      - main
    paths:
      - "Api/**"

jobs:
  validate-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lab8db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      # Note: This project uses EnsureCreated() instead of migrations, 
      # but we keep this as a template for migration validation.
      - name: Check for pending model changes
        run: dotnet ef migrations has-pending-model-changes --project Api --startup-project Api || echo "No migrations found or EF not configured with migrations."

      - name: Generate idempotent SQL script
        run: dotnet ef migrations script --idempotent --project Api --startup-project Api --output migrations.sql || echo "No migrations found."

      - name: Upload migration script
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-sql
          path: migrations.sql
